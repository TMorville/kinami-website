<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drone Reporter — Kinami</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Infant:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <link rel="icon" type="image/x-icon" href="/assets/logo/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/logo/apple-touch-icon.png">
  <meta property="og:title" content="Drone Reporter — Kinami">
  <meta property="og:description" content="Hybrid warfare is a reality in Europe. Play your part in our defence.">
  <meta property="og:image" content="https://kinami.io/assets/logo/og.png">
  <meta property="og:url" content="https://kinami.io/dronereporter/">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://kinami.io/assets/logo/og.png">
  <meta name="theme-color" content="#0A0907">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --void:#0A0907; --panel:#12100B;
      --text:#EDE7DA; --text-dim:#9A9180; --text-faint:rgba(237,231,218,0.40);
      --line:rgba(220,180,100,0.10); --line-strong:rgba(220,180,100,0.24);
      --signal:#E8A33D;
      --serif:'Cormorant Infant', serif; --mono:'DM Mono', monospace;
    }
    body {
      background: var(--void); color: var(--text);
      font-family: var(--serif);
      height: 100svh; overflow-y: scroll;
      scroll-snap-type: y mandatory;
    }
    body::before {
      content:""; position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        repeating-linear-gradient(90deg, var(--line) 0 1px, transparent 1px 80px);
      opacity: 0.5;
    }
    .view {
      position: relative; height: 100svh; scroll-snap-align: start;
      display: flex; flex-direction: column; justify-content: center;
      padding: 0 8vw; overflow: hidden;
    }
    .mono { font-family: var(--mono); font-weight: 300; text-transform: uppercase; letter-spacing: 0.12em; }
    .dot { display:inline-block; width:7px; height:7px; border-radius:50%; background:var(--signal); margin-right:8px; vertical-align:middle; animation:pulse 2.4s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:.35} 50%{opacity:1} }
    #hero { padding: 0; }
    #hero video { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; z-index:1; }
    #hero .scrim { position:absolute; inset:0; z-index:2;
      background: linear-gradient(180deg, rgba(10,9,7,0.25) 0%, rgba(10,9,7,0) 40%, rgba(10,9,7,0.7) 100%); }
    #hero .topbar { position:absolute; top:26px; left:8vw; right:8vw; z-index:3;
      display:flex; justify-content:space-between; align-items:center;
      font-family:var(--mono); font-size:11px; text-transform:uppercase; letter-spacing:0.14em; color:var(--text-dim); }
    #hero .topbar .status { color:var(--signal); }
    #hero .line { position:relative; z-index:3; margin-top:auto; margin-bottom:13vh; max-width:980px;
      opacity:0; animation:rise 1.1s ease forwards 0.4s; }
    #hero .kicker { font-family:var(--mono); font-size:11px; text-transform:uppercase; letter-spacing:0.16em;
      color:var(--signal); margin-bottom:18px; }
    #hero h1 { font-family:var(--serif); font-weight:300; font-size:clamp(34px,6vw,76px); line-height:1.1; letter-spacing:0.01em; color:var(--text); }
    #hero h1 .accent { display:block; color:var(--signal); }
    @keyframes rise { from{opacity:0; transform:translateY(12px)} to{opacity:1; transform:none} }
    .scroll-cue { position:absolute; bottom:24px; left:50%; transform:translateX(-50%); z-index:3;
      font-family:var(--mono); font-size:10px; letter-spacing:0.2em; color:var(--text-faint); animation:cue 2.4s ease-in-out infinite; }
    @keyframes cue { 0%,100%{opacity:.3} 50%{opacity:.8} }
    .panel { position:relative; z-index:3; max-width:640px; }
    .panel .eyebrow { font-family:var(--mono); font-size:11px; text-transform:uppercase; letter-spacing:0.14em; color:var(--signal); margin-bottom:20px; }
    .panel .eyebrow::before { content:""; display:inline-block; width:24px; height:1px; background:var(--line-strong); margin-right:12px; vertical-align:middle; }
    .panel h2 { font-family:var(--serif); font-weight:400; font-size:clamp(30px,4.6vw,52px); line-height:1.15; color:var(--text); margin-bottom:26px; }
    .panel p { font-family:var(--serif); font-size:clamp(17px,2vw,20px); line-height:1.6; color:var(--text-dim); margin-bottom:14px; max-width:48ch; }
    @media (prefers-reduced-motion: reduce) {
      #hero .line { animation:none; opacity:1; } .scroll-cue, .dot { animation:none; }
    }
    @media (max-width: 768px) {
      .view { padding:0 24px; } #hero .topbar { left:24px; right:24px; } #hero .line { margin-bottom:16vh; }
    }
  </style>
</head>
<body>
  <!-- View 1 — Hero -->
  <section id="hero" class="view">
    <video autoplay muted playsinline preload="auto" poster="assets/hero-poster.jpg">
      <source src="assets/hero.mp4" type="video/mp4">
    </video>
    <div class="scrim"></div>
    <div class="topbar">
      <span>Drone Reporter</span>
      <span class="status"><i class="dot"></i>Beta</span>
    </div>
    <div class="line">
      <div class="kicker">European airspace · Hybrid threat</div>
      <h1>Hybrid warfare is a reality in Europe.<span class="accent">Play your part in our defence.</span></h1>
    </div>
    <div class="scroll-cue" aria-hidden="true">Scroll ↓</div>
  </section>

  <!-- View 2 — What it is (Task A3) -->
  <section id="what" class="view"></section>

  <!-- View 3 — Live in beta (Task A4) -->
  <section id="beta" class="view"></section>

  <script>
    // Respect reduced-motion: don't autoplay the hero; rest on the poster / first frame.
    if (matchMedia('(prefers-reduced-motion: reduce)').matches) {
      const v = document.querySelector('#hero video');
      if (v) { v.removeAttribute('autoplay'); v.autoplay = false; try { v.pause(); v.currentTime = 0; } catch (e) {} }
    }
  </script>
</body>
</html>
