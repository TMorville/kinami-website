<!DOCTYPE html>
<html class="staticrypt-html">
    <head>
        <meta charset="utf-8" />
        <title>Drone Reporter</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- do not cache this page -->
        <meta http-equiv="cache-control" content="max-age=0" />
        <meta http-equiv="cache-control" content="no-cache" />
        <meta http-equiv="expires" content="0" />
        <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
        <meta http-equiv="pragma" content="no-cache" />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Cormorant+Infant:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@300;400&family=Anton&display=swap" rel="stylesheet" />

        <style>
            :root {
                --void: #0A0907;
                --panel: #100E0A;
                --text: #EDE7DA;
                --text-dim: #9A9180;
                --line: rgba(220, 180, 100, 0.22);
                --signal: #E8A33D;
                --serif: "Cormorant Infant", Georgia, serif;
                --mono: "DM Mono", ui-monospace, monospace;
            }

            .staticrypt-html,
            .staticrypt-body {
                height: 100%;
                margin: 0;
            }

            .staticrypt-content {
                height: 100%;
                margin: 0;
                background: var(--void);
                color: var(--text);
                font-family: var(--serif);
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }

            .staticrypt-page {
                min-height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                box-sizing: border-box;
                padding: 24px;
            }

            .staticrypt-form {
                position: relative;
                z-index: 1;
                width: 100%;
                max-width: 420px;
                background: var(--panel);
                border: 1px solid var(--line);
                padding: 56px 48px 48px;
                text-align: left;
                box-shadow: 0 30px 80px -30px rgba(0, 0, 0, 0.9);
            }

            .staticrypt-instructions {
                margin: 0 0 4px;
            }

            .staticrypt-kicker {
                font-family: var(--mono);
                font-size: 11px;
                text-transform: uppercase;
                letter-spacing: 0.16em;
                color: var(--signal);
                margin: 0 0 18px;
            }

            .staticrypt-kicker::before {
                content: "";
                display: inline-block;
                width: 24px;
                height: 1px;
                background: var(--signal);
                margin-right: 12px;
                vertical-align: middle;
                opacity: 0.6;
            }

            .staticrypt-title {
                font-family: var(--serif);
                font-weight: 300;
                font-size: 40px;
                line-height: 1.05;
                color: var(--text);
                margin: 0;
            }

            .staticrypt-instructions p:not(.staticrypt-title):not(.staticrypt-kicker) {
                font-family: var(--mono);
                font-size: 13px;
                line-height: 1.5;
                color: var(--text-dim);
                margin: 16px 0 0;
            }

            .staticrypt-hr {
                margin: 28px 0 24px;
                border: 0;
                border-top: 1px solid var(--line);
            }

            .staticrypt-password-container {
                position: relative;
                background: rgba(237, 231, 218, 0.04);
                border: 1px solid var(--line);
                width: 100%;
                margin: 0 0 16px;
                box-sizing: border-box;
            }

            .staticrypt-form input[type="password"],
            .staticrypt-form input[type="text"] {
                background: transparent;
                border: 0;
                box-sizing: border-box;
                font-family: var(--mono);
                font-size: 15px;
                color: var(--text);
                outline: 0;
                padding: 16px 44px 16px 16px;
                width: 100%;
            }

            .staticrypt-form input::placeholder {
                color: var(--text-dim);
                opacity: 0.7;
            }

            .staticrypt-toggle-password-visibility {
                cursor: pointer;
                height: 18px;
                width: 18px;
                opacity: 0.65;
                filter: invert(0.85);
                padding: 14px;
                position: absolute;
                right: 0;
                top: 50%;
                transform: translateY(-50%);
            }

            .staticrypt-form .staticrypt-decrypt-button {
                text-transform: uppercase;
                letter-spacing: 0.14em;
                font-family: var(--mono);
                font-size: 13px;
                outline: 0;
                background: var(--signal);
                width: 100%;
                border: 0;
                padding: 16px;
                color: var(--void);
                cursor: pointer;
                transition: filter 0.15s ease;
            }

            .staticrypt-form .staticrypt-decrypt-button:hover,
            .staticrypt-form .staticrypt-decrypt-button:active,
            .staticrypt-form .staticrypt-decrypt-button:focus {
                filter: brightness(108%);
            }

            label.staticrypt-remember {
                display: flex;
                align-items: center;
                font-family: var(--mono);
                font-size: 12px;
                color: var(--text-dim);
                margin-bottom: 1em;
            }

            .staticrypt-remember input[type="checkbox"] {
                transform: scale(1.3);
                margin-right: 1em;
                accent-color: var(--signal);
            }

            .hidden {
                display: none !important;
            }

            .staticrypt-spinner-container {
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                background: var(--void);
            }

            .staticrypt-spinner {
                display: inline-block;
                width: 2rem;
                height: 2rem;
                border: 0.22em solid rgba(232, 163, 61, 0.25);
                border-right-color: var(--signal);
                border-radius: 50%;
                animation: spinner-border 0.75s linear infinite;
            }

            @keyframes spinner-border {
                100% {
                    transform: rotate(360deg);
                }
            }

            @media screen and (-webkit-min-device-pixel-ratio: 0) {
                .staticrypt-form input[type="password"],
                .staticrypt-form input[type="text"] {
                    font-size: 16px;
                }
            }
        </style>
    </head>
